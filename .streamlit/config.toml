[server]
headless = true
port = 8501
maxUploadSize = 200
enableCORS = false
enableXsrfProtection = true

[logger]
level = "info"

[browser]
gatherUsageStats = false

# ─── Bluestar Command Center Theme ───────────────────────────────────────────
# Deep navy dark theme with electric blue accents — inspired by space command
# interfaces and game dev tooling. Professional, data-dense, unmistakably custom.

[theme]
base = "dark"
primaryColor = "#38BDF8"
backgroundColor = "#0B1120"
secondaryBackgroundColor = "#151E32"
textColor = "#E2E8F0"

linkColor = "#38BDF8"
codeTextColor = "#A5F3FC"
codeBackgroundColor = "#0F172A"
borderColor = "#1E293B"
showWidgetBorder = true
showSidebarBorder = true

# Typography — Outfit: geometric, modern, distinctive
font = "Outfit:https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
headingFont = "Outfit:https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"

baseFontSize = 14
baseFontWeight = 400
codeFontSize = "13px"
codeFontWeight = 400
headingFontSizes = ["30px", "22px", "18px", "15px", "13px", "12px"]
headingFontWeights = [600, 600, 600, 500, 500, 500]
linkUnderline = false

# Radius — crisp but not sharp
baseRadius = "8px"
buttonRadius = "8px"

# Semantic colors
blueColor = "#38BDF8"
greenColor = "#34D399"
yellowColor = "#FBBF24"
orangeColor = "#FB923C"
redColor = "#F87171"
violetColor = "#A78BFA"
grayColor = "#64748B"

# Chart palette — vivid against dark backgrounds
chartCategoricalColors = ["#38BDF8", "#34D399", "#FBBF24", "#F87171", "#A78BFA", "#FB923C", "#2DD4BF", "#E879F9"]

# Dataframes
dataframeBorderColor = "#1E293B"
dataframeHeaderBackgroundColor = "#0F172A"

# Sidebar — even deeper
[theme.sidebar]
backgroundColor = "#070D1A"
secondaryBackgroundColor = "#0B1120"
codeBackgroundColor = "#0B1120"
textColor = "#CBD5E1"
borderColor = "#1E293B"
primaryColor = "#38BDF8"
